name: Top30 Cloud Scan

on:
  schedule:
    # 每天4次，UTC 1/7/13/19 = 北京时间 9:00 / 15:00 / 21:00 / 03:00（次日）
    # 覆盖：A股收盘后、美股开盘前、美股收盘后、次日亚洲早盘
    - cron: '0 1 * * *'   # 北京 09:00（A股开盘）
    - cron: '0 7 * * *'   # 北京 15:00（A股收盘）
    - cron: '0 13 * * *'  # 北京 21:00（美股开盘）
    - cron: '0 19 * * *'  # 北京 03:00（美股收盘）
  workflow_dispatch:   # 支持手动触发

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # 最多跑20分钟，防止卡住

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance>=0.2.37 curl_cffi>=0.6.0 pandas requests tushare

      - name: Run cloud scan
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          GIST_TOKEN:    ${{ secrets.GIST_TOKEN }}
          GIST_ID:       ${{ secrets.GIST_ID }}
        run: python scan_worker.py --cloud --force

      - name: Report result
        if: always()
        run: echo "Scan finished at $(TZ='Asia/Shanghai' date)"
